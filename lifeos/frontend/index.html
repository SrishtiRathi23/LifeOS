<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LifeOS is a beautiful personal operating system for planning, journaling, goals, wellness, and student life."
    />
    <title>LifeOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=Dancing+Script:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        const savedTheme = localStorage.getItem("lifeos-theme") || "parchment";
        document.documentElement.dataset.theme = savedTheme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
